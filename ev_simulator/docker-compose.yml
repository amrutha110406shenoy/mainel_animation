version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ev-simulator-backend
    ports:
      - "8000:8000"
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - MODEL_PATH=/app/model/charging_model.pkl
      - SECRET_KEY=${SECRET_KEY}
    volumes:
      - ./backend:/app
      - ./model:/app/model
    command: python main.py
    networks:
      - ev-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ev-simulator-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev
    networks:
      - ev-network
    depends_on:
      backend:
        condition: service_healthy

networks:
  ev-network:
    driver: bridge

volumes:
  backend-cache:
  frontend-cache:
